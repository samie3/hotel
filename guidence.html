<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">

<title>Lavipark Hotel — User Guide & Documentation</title>
<style>
:root {
  --gold: #c9a96e;
  --gold-light: #e8d5a3;
  --gold-dark: #a8873f;
  --dark: #1a1a2e;
  --darker: #0f0f1a;
  --card: #1e1e3a;
  --card-hover: #2a2a4a;
  --text: #e0e0e0;
  --text-dim: #999;
  --accent: #4fc3f7;
  --success: #66bb6a;
  --warn: #ffa726;
  --danger: #ef5350;
  --border: #333366;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height:1.7;
  overflow-x:hidden;
}
body.rtl { direction:rtl; font-family:'Segoe UI','Noto Sans Arabic','Helvetica Neue',Arial,sans-serif; }

/* ===== STICKY HEADER ===== */
header {
  position:sticky; top:0; z-index:1000;
  background:linear-gradient(135deg,var(--darker) 0%,var(--dark) 100%);
  border-bottom:2px solid var(--gold);
  padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
header .logo { display:flex; align-items:center; gap:12px; }
header .logo img { height:40px; border-radius:4px; }
header .logo h1 { font-size:1.2rem; color:var(--gold); font-weight:700; }
header .logo span { font-size:0.75rem; color:var(--text-dim); display:block; }

.lang-switch { display:flex; gap:4px; background:rgba(255,255,255,0.05); border-radius:8px; padding:3px; }
.lang-btn {
  padding:8px 18px; border:none; border-radius:6px; cursor:pointer;
  font-size:0.85rem; font-weight:600;
  background:transparent; color:var(--text-dim); transition:all .3s;
}
.lang-btn.active { background:var(--gold); color:var(--darker); }
.lang-btn:hover:not(.active) { color:var(--gold); }

/* ===== HERO ===== */
.hero {
  background:linear-gradient(135deg,var(--darker) 0%,#1a1a3e 50%,var(--darker) 100%);
  text-align:center; padding:60px 20px 40px;
  border-bottom:1px solid var(--border);
}
.hero h2 { font-size:2rem; color:var(--gold); margin-bottom:8px; }
.hero p { color:var(--text-dim); max-width:700px; margin:0 auto; font-size:1rem; }
.hero .badge {
  display:inline-block; margin-top:12px;
  background:rgba(201,169,110,0.15); color:var(--gold);
  padding:6px 18px; border-radius:20px; font-size:0.85rem; border:1px solid var(--gold-dark);
}
.lang-hide { display:none; }

/* ===== MAIN LAYOUT ===== */
.layout { display:flex; min-height:100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width:280px; flex-shrink:0;
  background:var(--darker);
  border-right:1px solid var(--border);
  padding:20px 0;
  position:sticky; top:68px; height:calc(100vh - 68px);
  overflow-y:auto; overflow-x:hidden;
}
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--gold-dark); border-radius:4px; }
.sidebar .toc-title {
  padding:8px 20px 16px;
  font-size:0.85rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border); margin-bottom:8px;
}

.sidebar a {
  display:block; padding:10px 20px;
  color:var(--text-dim); text-decoration:none;
  font-size:0.85rem; border-left:3px solid transparent;
  transition:all .3s; position:relative;
}
.sidebar a:hover, .sidebar a.active {
  color:var(--gold); background:rgba(201,169,110,0.06);
  border-left-color:var(--gold);
}
.sidebar a.section-head {
  color:var(--text); font-weight:700; font-size:0.9rem;
  padding-top:16px; padding-bottom:8px;
  border-left-color:transparent;
}
.sidebar a.section-head:hover { background:transparent; color:var(--gold); }
.sidebar a.sub { padding-left:36px; font-size:0.8rem; }

/* ===== CONTENT ===== */
.content {
  flex:1; min-width:0;
  padding:30px 40px 80px;
  max-width:1000px;
}

.section {
  margin-bottom:40px;
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;
  transition:box-shadow .3s;
}
.section:hover { box-shadow:var(--shadow); }

.section-header {
  padding:18px 24px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(90deg,rgba(201,169,110,0.08),transparent);
  user-select:none;
  gap:12px;
}
.section-header:hover { background:rgba(201,169,110,0.12); }
.section-header h3 {
  font-size:1.1rem; color:var(--gold);
  display:flex; align-items:center; gap:10px;
}
.section-header h3 .num {
  display:inline-flex; align-items:center; justify-content:center;
  width:28px; height:28px; border-radius:50%;
  background:var(--gold); color:var(--darker);
  font-size:0.75rem; font-weight:800; flex-shrink:0;
}
.section-header .toggle-icon {
  width:24px; height:24px; flex-shrink:0;
  transition:transform .3s;
  color:var(--gold);
}
.section-header .toggle-icon.open { transform:rotate(180deg); }

.section-body {
  padding:0 24px;
  max-height:0; overflow:hidden;
  transition:max-height .5s ease, padding .4s ease;
}
.section-body.open {
  max-height:6000px;
  padding:24px;
}

/* ===== CONTENT STYLES ===== */
.section-body p { margin-bottom:1rem; }
.section-body ul, .section-body ol { margin-bottom:1rem; padding-left:24px; }
body.rtl .section-body ul, body.rtl .section-body ol { padding-left:0; padding-right:24px; }
.section-body li { margin-bottom:6px; }
.section-body strong { color:var(--gold); }
.section-body code {
  background:rgba(255,255,255,0.06);
  padding:2px 8px; border-radius:4px;
  font-size:0.85rem; color:var(--accent);
  word-break:break-all;
}
.section-body .tip {
  background:rgba(79,195,247,0.08); border-left:3px solid var(--accent);
  padding:12px 16px; border-radius:6px; margin:12px 0;
  font-size:0.9rem;
}
body.rtl .section-body .tip { border-left:none; border-right:3px solid var(--accent); }
.section-body .warn-box {
  background:rgba(255,167,38,0.08); border-left:3px solid var(--warn);
  padding:12px 16px; border-radius:6px; margin:12px 0;
  font-size:0.9rem;
}
.section-body table {
  width:100%; border-collapse:collapse; margin:12px 0;
  font-size:0.9rem;
}
.section-body th {
  background:rgba(201,169,110,0.12); color:var(--gold);
  padding:10px 12px; text-align:left; font-weight:600;
  border:1px solid var(--border);
}
body.rtl .section-body th { text-align:right; }
.section-body td {
  padding:8px 12px; border:1px solid var(--border);
  background:rgba(255,255,255,0.02);
}
.section-body tr:hover td { background:rgba(255,255,255,0.04); }
.section-body hr { border:none; border-top:1px solid var(--border); margin:20px 0; }

/* ===== IMAGE GALLERY / CAROUSEL ===== */
.img-gallery {
  margin:16px 0; position:relative;
  background:rgba(0,0,0,0.3); border-radius:8px;
  overflow:hidden;
}
.img-gallery .gallery-inner {
  display:flex; overflow:hidden; position:relative;
}
.img-gallery .gallery-slide {
  display:flex; transition:transform .5s ease;
}
.img-gallery .gallery-slide img {
  width:100%; height:auto; max-height:500px;
  object-fit:contain; flex-shrink:0;
  cursor:pointer;
}

.gallery-nav {
  display:flex; justify-content:center; align-items:center;
  gap:12px; padding:8px;
  background:rgba(0,0,0,0.5);
}
.gallery-nav button {
  background:var(--gold); color:var(--darker);
  border:none; width:36px; height:36px; border-radius:50%;
  cursor:pointer; font-size:1.1rem; font-weight:700;
  transition:all .3s; display:flex; align-items:center; justify-content:center;
}
.gallery-nav button:hover { background:var(--gold-light); transform:scale(1.1); }
.gallery-nav .gallery-dots { display:flex; gap:6px; }
.gallery-nav .dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--text-dim); cursor:pointer; transition:all .3s;
  border:none;
}
.gallery-nav .dot.active { background:var(--gold); transform:scale(1.3); }
.gallery-nav .gallery-counter {
  color:var(--text-dim); font-size:0.8rem; min-width:50px; text-align:center;
}
.img-caption {
  font-size:0.8rem; color:var(--text-dim);
  text-align:center; padding:6px; font-style:italic;
}

/* Lightbox */
.lightbox {
  display:none; position:fixed; z-index:9999;
  top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.92);
  justify-content:center; align-items:center;
  cursor:zoom-out;
}
.lightbox.open { display:flex; }
.lightbox img {
  max-width:95vw; max-height:95vh;
  object-fit:contain;
  border-radius:8px;
  box-shadow:0 0 60px rgba(0,0,0,0.8);
}
.lightbox .close-lb {
  position:absolute; top:20px; right:30px;
  font-size:2.5rem; color:#fff; cursor:pointer;
  transition:color .3s;
}
.lightbox .close-lb:hover { color:var(--gold); }

/* ===== TOC BOTTOM NAV ===== */
.bottom-nav {
  display:flex; justify-content:space-between; gap:12px;
  margin-top:30px; padding:20px 0;
  border-top:1px solid var(--border);
}
.bottom-nav button {
  padding:12px 24px; border:none; border-radius:8px;
  cursor:pointer; font-weight:600; font-size:0.9rem;
  transition:all .3s;
  background:rgba(201,169,110,0.1); color:var(--gold);
  border:1px solid var(--gold-dark);
}
.bottom-nav button:hover { background:var(--gold); color:var(--darker); }
.bottom-nav button:disabled { opacity:0.3; cursor:default; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .content { padding:20px; }
}
@media (max-width: 768px) {
  .layout { flex-direction:column; }
  .sidebar {
    display:none; width:100%;
    position:fixed; top:64px; left:0; z-index:999;
    height:calc(100vh - 64px);
    border-right:none;
  }
  .sidebar.open { display:block; }
  .sidebar-toggle {
    display:flex !important;
    align-items:center; justify-content:center;
    background:var(--gold); color:var(--darker);
    border:none; width:36px; height:36px; border-radius:6px;
    cursor:pointer; font-size:1.2rem;
  }
  .content { padding:16px; }
  .section-body.open { max-height:9000px; }
  .section-header { padding:14px 16px; }
  .section-body.open { padding:16px; }
  header .logo h1 { font-size:1rem; }
  header .logo span { display:none; }
  .hero h2 { font-size:1.4rem; }
  .section-body table { font-size:0.8rem; }
  .section-body th, .section-body td { padding:6px 8px; }
}

@media (max-width: 480px) {
  .img-gallery .gallery-slide img { max-height:300px; }
  .section-header h3 { font-size:0.95rem; }
  .section-body.open { max-height:12000px; }
  header { padding:8px 12px; }
  .lang-btn { padding:6px 12px; font-size:0.75rem; }
}

/* ===== LAZY LOAD ===== */
.lazy-img { opacity:0; transition:opacity .5s; }
.lazy-img.loaded { opacity:1; }

/* ===== PRINT ===== */
@media print {
  .sidebar, header, .bottom-nav, .gallery-nav, .section-header { display:none !important; }
  .section-body { max-height:none !important; overflow:visible !important; padding:24px !important; }
  .section { break-inside:avoid; border:1px solid #ccc; }
  body { background:#fff; color:#000; }
  .section-body img { max-width:500px !important; }
}
</style>

let currentLang = 'en';
let currentSection = 0;

// ===== BUILD GALLERY =====
function buildGallery(container) {
  const imgs = container.getAttribute('imgs');
  if (!imgs) return;
  const names = imgs.split(',');
  const base = 'https://laviparkhotels.com/guide-images/';

  container.innerHTML = `
    <div class="gallery-inner">
      <div class="gallery-slide" id="gslide-${Date.now()}-${Math.random().toString(36).substr(2,5)}">
        ${names.map(n => `<img class="lazy-img" data-src="${base}${n.trim()}.png" alt="Screenshot" onclick="openLightbox(this.src)" loading="lazy">`).join('')}
      </div>
    </div>
    <div class="gallery-nav">
      <button onclick="galleryNav(this.parentElement,'prev')">‹</button>
      <div class="gallery-dots">${names.map((_,i) => `<button class="dot${i===0?' active':''}" data-idx="${i}" onclick="galleryGoTo(this.parentElement.parentElement,${i})"></button>`).join('')}</div>
      <span class="gallery-counter">1 / ${names.length}</span>
      <button onclick="galleryNav(this.parentElement,'next')">›</button>
    </div>
  `;

  // Lazy load
  container.querySelectorAll('.lazy-img').forEach(img => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          img.src = img.dataset.src;
          img.classList.add('loaded');
          observer.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });
    observer.observe(img);
  });
}

function galleryNav(nav, dir) {
  const slide = nav.parentElement.querySelector('.gallery-slide');
  const dots = nav.querySelectorAll('.dot');
  const counter = nav.querySelector('.gallery-counter');
  const total = dots.length;
  const active = Array.from(dots).findIndex(d => d.classList.contains('active'));
  let next = dir === 'next' ? (active + 1) % total : (active - 1 + total) % total;
  slide.style.transform = `translateX(-${next * 100}%)`;
  dots.forEach((d,i) => d.classList.toggle('active', i === next));
  counter.textContent = `${next + 1} / ${total}`;
}

function galleryGoTo(nav, idx) {
  const slide = nav.parentElement.querySelector('.gallery-slide');
  const dots = nav.querySelectorAll('.dot');
  const counter = nav.querySelector('.gallery-counter');
  slide.style.transform = `translateX(-${idx * 100}%)`;
  dots.forEach((d,i) => d.classList.toggle('active', i === idx));
  counter.textContent = `${idx + 1} / ${dots.length}`;
}

function openLightbox(src) {
  document.getElementById('lightbox').classList.add('open');
  document.getElementById('lightboxImg').src = src;
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ===== BUILD CONTENT =====
function renderLang(lang) {
  const data = guideData[lang];
  if (!data) return;

  currentLang = lang;
  const isAr = lang === 'ar';

  // Update header
  document.getElementById('site-title').textContent = data.title;
  document.getElementById('site-sub').textContent = data.sub;
  document.getElementById('heroTitle').textContent = data.heroTitle;
  document.getElementById('heroSub').textContent = data.heroSub;
  document.getElementById('heroBadge').textContent = data.heroBadge;
  document.getElementById('tocTitle').textContent = data.toc;

  // RTL
  document.body.className = isAr ? 'rtl' : '';
  document.documentElement.lang = lang;
  document.documentElement.dir = isAr ? 'rtl' : 'ltr';

  // Lang buttons
  document.getElementById('langEn').classList.toggle('active', !isAr);
  document.getElementById('langAr').classList.toggle('active', isAr);

  // Build TOC
  const toc = document.getElementById('tocContainer');
  toc.innerHTML = data.sections.map((s, i) => `
    <a href="javascript:scrollToSection(${i})" class="section-head" data-idx="${i}">${s.num}. ${s.title}</a>
    ${(s.subs || []).map(sub => `<a href="javascript:scrollToSection(${i})" class="sub" data-idx="${i}">${sub}</a>`).join('')}
  `).join('');

  // Build sections
  const main = document.getElementById('mainContent');
  main.innerHTML = data.sections.map((s, i) => `
    <div class="section" data-idx="${i}">
      <div class="section-header" onclick="toggleSection(this)">
        <h3><span class="num">${s.num}</span> ${s.title}</h3>
        <svg class="toggle-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
      <div class="section-body" id="section-${i}">
        ${s.content}
      </div>
    </div>
  `).join('');

  // Init galleries
  document.querySelectorAll('.img-gallery').forEach(g => buildGallery(g));

  // Open first section
  const first = document.querySelector('.section-body');
  if (first) {
    first.classList.add('open');
    first.parentElement.querySelector('.toggle-icon').classList.add('open');
  }
}

// ===== INTERACTIONS =====
function switchLang(lang) {
  if (lang === currentLang) return;
  renderLang(lang);
  localStorage.setItem('guideLang', lang);
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.toggle-icon');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  icon.classList.toggle('open');
}

function scrollToSection(idx) {
  const el = document.querySelector(`.section[data-idx="${idx}"]`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Open the section
    const body = el.querySelector('.section-body');
    const icon = el.querySelector('.toggle-icon');
    if (body && !body.classList.contains('open')) {
      body.classList.add('open');
      icon.classList.add('open');
    }
  }
  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== INIT =====
const savedLang = localStorage.getItem('guideLang') || 'en';
renderLang(savedLang);
