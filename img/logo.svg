<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355"/>
      <stop offset="50%" style="stop-color:#7B5E3D"/>
      <stop offset="100%" style="stop-color:#6B4E2D"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#bronze)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- L shape: vertical line with base -->
    <path d="M 120 80 L 120 420"/>
    <path d="M 120 420 L 250 420"/>
    <!-- W shape: diagonal zigzag -->
    <path d="M 250 420 L 310 250 L 370 420"/>
    <!-- M shape: vertical ending -->
    <path d="M 370 420 L 370 120"/>
    <path d="M 370 120 L 380 80"/>
    <!-- Finishing vertical with gap -->
    <path d="M 380 80 L 400 80"/>
    <path d="M 400 80 L 400 180"/>
  </g>
</svg>
